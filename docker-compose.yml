version: "3.8"

services:
  backend:
    build: ../scheduler
    container_name: scheduler-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    volumes:
      - oauth-tokens:/var/data/scheduler/oauth-tokens
      - sqlite-data:/app/data
    expose:
      - "8080"

  frontend:
    build:
      context: ../smart-orchestrator
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: scheduler-frontend
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - backend

  mood-detector:
    build: ../mood-detector
    container_name: mood-detector
    restart: unless-stopped
    environment:
      - HUGGINGFACE_API_TOKEN=${HUGGINGFACE_API_TOKEN}
      - HUGGINGFACE_VISION_MODEL=${HUGGINGFACE_VISION_MODEL:-Qwen/Qwen3-VL-8B-Instruct}
    expose:
      - "8080"
    mem_limit: 600m

  mood-drink-api:
    build: ../mood-drink-api
    container_name: mood-drink-api
    restart: unless-stopped
    expose:
      - "3001"
    mem_limit: 256m

  gateway:
    image: nginx:alpine
    container_name: scheduler-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
      - mood-detector
      - mood-drink-api

volumes:
  oauth-tokens:
  sqlite-data:
